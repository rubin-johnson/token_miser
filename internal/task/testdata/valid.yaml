id: "task-001"
name: "Test Task"
type: "single_shot"
repo: "https://github.com/example/repo"
starting_commit: "abc123"
prompt: "Implement a feature"
success_criteria:
  - type: "file_exists"
    paths: ["src/main.go", "README.md"]
  - type: "command_success"
    command: "go test ./..."
  - type: "output_contains"
    contains: ["success", "passed"]
quality_rubric:
  - dimension: "code_quality"
    prompt: "Rate the code quality from 1-10"
  - dimension: "documentation"
    prompt: "Evaluate documentation completeness"
