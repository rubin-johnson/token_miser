repos:
  - id: tiny-cli
    type: fixture
    bundle: fixtures/tiny-cli/repo.bundle
    commit: HEAD

  - id: tiny-cli-buggy-import
    type: fixture
    bundle: fixtures/tiny-cli/repo.bundle
    commit: buggy-import-cycle

  - id: tiny-api
    type: fixture
    bundle: fixtures/tiny-api/repo.bundle
    commit: HEAD

  - id: tiny-api-buggy-pagination
    type: fixture
    bundle: fixtures/tiny-api/repo.bundle
    commit: buggy-pagination

  - id: tiny-api-buggy-500
    type: fixture
    bundle: fixtures/tiny-api/repo.bundle
    commit: buggy-500

  - id: flask
    url: https://github.com/pallets/flask.git
    commit: "3.1.0"
    shallow: true
    setup_commands:
      - "python -m venv .venv"
      - ".venv/bin/pip install -e '.[dev]'"

  - id: httpx
    url: https://github.com/encode/httpx.git
    commit: "0.28.1"
    shallow: true
    setup_commands:
      - "python -m venv .venv"
      - ".venv/bin/pip install -e '.[dev]'"

  # Domain: Python API
  - id: fastapi
    url: https://github.com/fastapi/fastapi.git
    commit: "0.115.6"
    shallow: true
    setup_commands:
      - "python -m venv .venv"
      - ".venv/bin/pip install -e '.[all,dev,test]'"

  # Domain: IaC
  - id: cdk-nag
    url: https://github.com/cdklabs/cdk-nag.git
    commit: "v2.34.0"
    shallow: true
    setup_commands:
      - "npm ci"

  - id: terraform-aws-modules-vpc
    url: https://github.com/terraform-aws-modules/terraform-aws-vpc.git
    commit: "v5.16.0"
    shallow: true
    setup_commands: []

  # Domain: Frontend
  - id: bulletproof-react
    url: https://github.com/alan2207/bulletproof-react.git
    commit: "master"
    shallow: true
    setup_commands:
      - "npm ci"
