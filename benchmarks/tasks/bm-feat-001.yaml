id: bm-feat-001
name: "Add CLI stats subcommand"
repo_id: tiny-cli
starting_commit: v1.0
category: feature
difficulty: easy
prompt: |
  Add a "stats" subcommand to this CLI tool. When run as `python -m tiny_cli stats <directory>`,
  it should print a summary showing: number of Python files, total lines of code, and average
  lines per file. Write tests for the new subcommand in tests/test_commands.py.
setup_commands:
  - "uv sync -q"
success_criteria:
  - type: file_exists
    paths: ["src/tiny_cli/commands/stats.py"]
  - type: command_exits_zero
    command: "uv run pytest tests/ -q"
quality_rubric:
  - dimension: correctness
    prompt: "Does the stats command correctly count files, lines, and compute averages?"
  - dimension: minimal_change
    prompt: "Did the implementation only add what was needed without refactoring existing code?"
