id: synth-002
name: "Implement validate_bundle"
# Set EXPERIMENT_REPO to the absolute path of your target repo before running.
# Example: export EXPERIMENT_REPO=$HOME/code/personal/loadout
repo: "${EXPERIMENT_REPO}"
starting_commit: "46d8b03"
prompt: |
  Read docs/design-notes.md for context. Then implement the validate_bundle function
  in src/loadout/validate.py. The function should:
  - Accept a Path to a bundle directory
  - Return a list of error strings (empty list = valid)
  - Check: manifest.yaml exists, required fields present, semver version, target files exist
  - Import and reuse load_manifest from manifest.py
  - Wire it into the CLI as `loadout validate <bundle>`

  Write tests in tests/test_validate.py. All existing tests must still pass.
success_criteria:
  - type: file_exists
    paths: ["src/loadout/validate.py"]
  - type: command_exits_zero
    command: "uv run pytest tests/test_manifest.py tests/test_scaffold.py -v"
  - type: command_exits_zero
    command: "uv run python -c \"from loadout.validate import validate_bundle; assert validate_bundle(None) != []\""
  - type: command_exits_zero
    command: "uv run python -m loadout validate --help"
quality_rubric:
  - dimension: "correctness"
    prompt: "Does validate_bundle collect all errors (not fail-fast)? Does it handle edge cases like None/empty path?"
  - dimension: "code_quality"
    prompt: "Is the code idiomatic Python? Does it properly reuse load_manifest rather than re-implementing YAML parsing?"
  - dimension: "cli_integration"
    prompt: "Does the validate CLI command print errors and exit 1 on failure, exit 0 on success?"
  - dimension: "test_passing"
    prompt: "Do all pre-existing tests still pass? Are new tests comprehensive?"
