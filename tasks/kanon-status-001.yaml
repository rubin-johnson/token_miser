id: kanon-status-001
name: "Add kanon status command"
repo: "${EXPERIMENT_REPO_KANON}"
starting_commit: "f5f069b"
prompt: |
  You are working in the kanon Python project — a CLI tool that manages versioned
  DevOps automation packages via declarative manifests. It uses a fork of Google's
  git-repo tool to sync packages from manifest repositories.

  Read the existing source code to understand the architecture. The key modules are
  in src/kanon_cli/ with CLI entry in cli.py, business logic in core/, and commands
  in commands/.

  Your task: add a `kanon status` command that shows the current state of a kanon
  project — which sources are configured, whether they're installed, and what
  packages are synced.

  Requirements:
  1. Create src/kanon_cli/commands/status.py with a handler function that:
     - Finds and parses the .kanon file using existing kanonenv.py
     - For each configured source, checks if .kanon-data/sources/<name>/ exists
     - If installed, lists the packages in .kanon-data/sources/<name>/.packages/
     - Reports marketplace install status (enabled/disabled from KANON_MARKETPLACE_INSTALL)
  2. Wire it into cli.py as `kanon status [.kanon]`
     - Print a summary: source name, installed (yes/no), package count, revision
     - Print marketplace status at the bottom
     - Exit 0 always (status is informational, not a pass/fail)
  3. Write tests in tests/unit/test_status.py covering:
     - Status with no .kanon file shows "No .kanon file found"
     - Status with .kanon but no installed sources shows sources as "not installed"
     - Status with installed sources and packages shows correct counts
  4. All existing tests must still pass.

  Follow the existing patterns: look at how commands/install.py delegates to
  core/install.py, how commands/clean.py is structured, and how cli.py registers
  subcommands. Match the style.
success_criteria:
  - type: file_exists
    paths: ["src/kanon_cli/commands/status.py"]
  - type: command_exits_zero
    command: "pip install -e '.[dev]' -q && python -m pytest tests/unit/ -q --tb=short"
  - type: command_exits_zero
    command: "python -c \"from kanon_cli.commands.status import run; print('import OK')\""
quality_rubric:
  - dimension: "correctness"
    prompt: "Does the status command correctly discover sources from .kanon, check installation state, and count packages? Do all tests pass including pre-existing ones?"
  - dimension: "code_reuse"
    prompt: "Does the implementation reuse kanonenv.py for parsing and follow the existing command/core separation pattern? Score 1.0 for clean pattern matching, lower for ad-hoc implementation."
  - dimension: "minimal_change"
    prompt: "Did Claude modify only what was necessary? Only new files plus CLI wiring? No gratuitous changes to existing modules?"
  - dimension: "test_quality"
    prompt: "Are the tests well-structured with proper fixtures? Do they test the three specified scenarios? Do they follow the existing test patterns in the repo?"
