id: synth-003
name: "Validate then test (cross-session memory)"
type: sequential
# Set EXPERIMENT_REPO to the absolute path of your target repo before running.
repo: "${EXPERIMENT_REPO}"
starting_commit: "46d8b03"
prompts:
  - |
    Read docs/design-notes.md for context. Implement validate_bundle in
    src/loadout/validate.py. The function should accept a Path, return a list
    of error strings, and check: manifest.yaml exists, required fields present,
    semver version, target files exist. Reuse load_manifest from manifest.py.
  - |
    Now write a comprehensive test suite for validate_bundle in
    tests/test_validate.py. Cover: valid bundle, missing manifest, missing
    required fields, invalid semver, missing target files, multiple errors
    at once. All tests must pass.
success_criteria:
  - type: file_exists
    paths: ["src/loadout/validate.py", "tests/test_validate.py"]
  - type: command_exits_zero
    command: "uv run pytest tests/ -v"
quality_rubric:
  - dimension: "memory_efficiency"
    prompt: "Does the second prompt reuse knowledge from the first without re-reading all files? Score based on token efficiency."
  - dimension: "test_quality"
    prompt: "Are the tests thorough, covering happy path and edge cases? Do they use proper fixtures?"
  - dimension: "correctness"
    prompt: "Do all tests pass? Does validate_bundle handle all documented cases?"
