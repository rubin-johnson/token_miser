name: "Scaffold Python Project"
description: "Test Claude's ability to scaffold a Python project (the loadout repo). This task tests vanilla-vs-loadout comparison by setting up the target project's toolchain."
target_repo: "/home/rujohnson/code/personal/loadout"
target_commit: "fd88685"
success_criteria:
  - type: "file_exists"
    path: "pyproject.toml"
    description: "Project configuration file exists"
  - type: "file_exists"
    path: "src/loadout/__init__.py"
    description: "Main package module exists"
  - type: "file_exists"
    path: "tests/test_loadout.py"
    description: "Test file exists"
  - type: "command_exit_code"
    command: "python -m pytest --version"
    expected_code: 0
    description: "pytest is available and working"
  - type: "command_exit_code"
    command: "python -c 'import loadout'"
    expected_code: 0
    description: "loadout package can be imported"
  - type: "output_content"
    command: "python -c 'import loadout; print(loadout.__version__)'"
    expected_pattern: "^\\d+\\.\\d+\\.\\d+"
    description: "Package has valid version string"
quality_rubric:
  - category: "structure"
    weight: 25
    description: "Proper Python package structure with src/ layout"
  - category: "cli_completeness"
    weight: 25
    description: "Command-line interface is complete and functional"
  - category: "tdd_readiness"
    weight: 25
    description: "Test framework is set up and ready for TDD workflow"
  - category: "code_quality"
    weight: 25
    description: "Code follows Python best practices and style guidelines"
